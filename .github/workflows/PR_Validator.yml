name: Pull Request — NeTEx XML Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**/*.xml"

jobs:
  validate:
    uses: hfjelstad/Profile_Documentation_v2/.github/workflows/INT_NeTEx_Validator.yml@main
    with:
      mode: pr
      checkout_ref: ${{ github.event.pull_request.head.sha }}
      base_ref: ${{ github.base_ref }}
      schema_path: "netex-xsd/xsd/NeTEx_publication.xsd"
      exclude_prefix: "netex-xsd/"
      fail_fast: false
