name: Validate NeTEx XML (changed files only)

on:
  push:
    paths:
      - "**/*.xml"
  pull_request:
    paths:
      - "**/*.xml"

jobs:
  validate-netex-xml:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # ← Fixes exit code 128

      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Validate only changed XML files
        run: |
          SCHEMA="XSD 2.0/xsd/NeTEx_publication.xsd"

          echo "Using schema: $SCHEMA"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }} origin/${{ github.head_ref }})
          else
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})
          fi

          echo "Changed files:"
          echo "$CHANGED"

          for xmlfile in $CHANGED; do
            if [[ "$xmlfile" == *.xml ]]; then
              echo "Validating $xmlfile"
              xmllint --schema "$SCHEMA" --noout "$xmlfile"
            fi
          done
